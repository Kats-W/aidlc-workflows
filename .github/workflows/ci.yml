name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main", "claude/**" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 #v23.0.0
        with:
          globs: "**/*.md"

  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run pytest tests/unit --cov=src --cov-report=xml -v

  cdk-ci:
    name: CDK CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx cdk synth --context env=dev 2>&1

  cdk-deploy-dev:
    name: CDK Deploy (dev)
    runs-on: ubuntu-latest
    needs: [python-ci, cdk-ci]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      - run: npm ci
      - name: Build Python deps Lambda layer
        run: |
          pip install \
            boto3 aioboto3 "aws-lambda-powertools>=2.0" httpx \
            beautifulsoup4 numpy msgpack \
            -t ./lambda-layer/python \
            --platform manylinux2014_x86_64 \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade
      - run: npx cdk bootstrap --context env=dev
      - name: Resolve existing Connect instance
        run: |
          INSTANCES=$(aws connect list-instances --max-results 100 --output json 2>/dev/null \
            || echo '{"InstanceSummaryList":[]}')
          INSTANCE_ID=$(echo "$INSTANCES" | jq -r '.InstanceSummaryList[] | select(.InstanceAlias == "au-jibun-bank-dev") | .Id // empty')
          INSTANCE_ARN=$(echo "$INSTANCES" | jq -r '.InstanceSummaryList[] | select(.InstanceAlias == "au-jibun-bank-dev") | .Arn // empty')
          if [ -n "$INSTANCE_ID" ]; then
            echo "CONNECT_CTX=--context connectInstanceId=$INSTANCE_ID --context connectInstanceArn=$INSTANCE_ARN" >> "$GITHUB_ENV"
            echo "Found existing Connect instance: $INSTANCE_ID"
          else
            echo "CONNECT_CTX=" >> "$GITHUB_ENV"
          fi
      - name: Deploy SharedInfra
        run: npx cdk deploy AuJibunBank-dev-SharedInfra --context env=dev --require-approval never $CONNECT_CTX
      - name: Deploy KnowledgePipeline
        run: npx cdk deploy AuJibunBank-dev-KnowledgePipeline --context env=dev --require-approval never
      - name: Deploy Conversation
        run: npx cdk deploy AuJibunBank-dev-Conversation --context env=dev --require-approval never
      - name: Deploy Omnichannel
        run: npx cdk deploy AuJibunBank-dev-Omnichannel --context env=dev --require-approval never
      - name: Deploy Profile
        run: npx cdk deploy AuJibunBank-dev-Profile --context env=dev --require-approval never
      - name: Deploy Improvement
        run: npx cdk deploy AuJibunBank-dev-Improvement --context env=dev --require-approval never
      - name: Deploy Dashboard
        run: npx cdk deploy AuJibunBank-dev-Dashboard --context env=dev --require-approval never
      - name: Comment deploy result on merged PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: ${{ github.workspace }}
        run: |
          PR=$(gh pr list --repo "$REPO" --search "is:merged" --state merged \
            --json number,mergeCommitOid \
            --jq ".[] | select(.mergeCommitOid == \"$SHA\") | .number" | head -1)
          if [ -z "$PR" ]; then
            echo "No merged PR found for SHA $SHA, skipping comment"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            BODY="✅ **CDK Deploy (dev) succeeded** — all stacks deployed at \`$SHA\`"
          else
            BODY="❌ **CDK Deploy (dev) failed** — [View logs]($RUN_URL)"
          fi
          gh pr comment "$PR" --repo "$REPO" --body "$BODY"
