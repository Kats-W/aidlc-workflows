name: Run Embedder

on:
  workflow_dispatch:
    inputs:
      payload:
        description: >-
          Diff payload JSON. The default deletes a nonexistent chunk
          (idempotent no-op) to verify the Lambda is healthy.
        required: false
        default: '{"upsert": [], "delete": ["__health_check__"]}'

permissions: {}

jobs:
  invoke:
    name: Invoke EmbedderLambda directly
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Invoke EmbedderLambda
        # Each batch now patches the cache incrementally (O(batch size)),
        # so invocations complete in seconds, not minutes.
        env:
          PAYLOAD: ${{ inputs.payload }}
        run: |
          set -o pipefail  # an `aws lambda invoke` failure must fail the job,
                           # not be swallowed by the trailing `| base64 -d`

          echo "$PAYLOAD" | jq -e . > /dev/null  # fail fast on malformed JSON
          echo "Payload: $PAYLOAD"
          echo ""

          aws lambda invoke \
            --function-name au-jibun-bank-dev-embedder \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 120 \
            --payload "$PAYLOAD" \
            --log-type Tail \
            --query 'LogResult' \
            --output text \
            response.json | base64 -d

          echo ""
          echo "----- Response -----"
          cat response.json | jq .

          # `aws lambda invoke` exits 0 as long as it receives *a* response,
          # even when that response is a Lambda-side error (e.g.
          # Runtime.OutOfMemory) — so a crashed invocation would otherwise be
          # reported as job "success". Fail explicitly when the payload
          # carries an errorType.
          if jq -e 'has("errorType")' response.json > /dev/null; then
            echo "::error::EmbedderLambda invocation failed: $(jq -r .errorMessage response.json)"
            exit 1
          fi
