name: Run Embedder

on:
  workflow_dispatch:
    inputs:
      payload:
        description: >-
          Diff payload JSON. The default forces a vector-cache rebuild without
          changing any data (deleting a nonexistent chunk is idempotent).
        required: false
        default: '{"upsert": [], "delete": ["__cache_rebuild__"], "rebuildCache": true}'

permissions: {}

jobs:
  invoke:
    name: Invoke EmbedderLambda directly
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Invoke EmbedderLambda
        # The embedder Lambda timeout is 15 minutes; extend the CLI read
        # timeout beyond that so the synchronous invoke does not give up
        # (or get its connection closed) before the Lambda itself returns.
        env:
          PAYLOAD: ${{ inputs.payload }}
        run: |
          set -o pipefail  # an `aws lambda invoke` failure must fail the job,
                           # not be swallowed by the trailing `| base64 -d`

          echo "$PAYLOAD" | jq -e . > /dev/null  # fail fast on malformed JSON
          echo "Payload: $PAYLOAD"
          echo ""

          aws lambda invoke \
            --function-name au-jibun-bank-dev-embedder \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 920 \
            --payload "$PAYLOAD" \
            --log-type Tail \
            --query 'LogResult' \
            --output text \
            response.json | base64 -d

          echo ""
          echo "----- Response -----"
          cat response.json | jq .
