name: Check Embedder Status

on:
  workflow_dispatch:

permissions: {}

jobs:
  check:
    name: Check latest embedder invocation
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Query CloudWatch Logs for latest embedder run
        run: |
          LOG_GROUP="/aws/lambda/au-jibun-bank-dev-embedder"

          # Get the most recent log stream
          STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --max-items 1 \
            --query 'logStreams[0].logStreamName' \
            --output text | head -1)

          echo "Latest log stream: $STREAM"
          echo ""

          # Fetch all log events from that stream and dump relevant lines
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$STREAM" \
            --start-from-head \
            --limit 10000 \
            --query 'events[*].message' \
            --output text | grep -E "(embedder finished|upserted|deleted|WARNING|ERROR|error|exception|Exception|AccessDenied|ValidationException)" || echo "(no summary lines found)"
